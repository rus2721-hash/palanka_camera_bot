name: Palanka Camera

on:
  workflow_dispatch:

  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python -m playwright install --with-deps chromium


      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
